---
- name: restart multica
  community.docker.docker_compose_v2:
    project_src: /opt/multica
    files: [docker-compose.selfhost.yml]
    state: restarted

- name: restart multica-daemon
  systemd:
    name: multica-daemon
    state: restarted

- name: reload systemd
  systemd:
    daemon_reload: true
